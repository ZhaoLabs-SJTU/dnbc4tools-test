# =============================================================================
# Docker Compose 配置 — dnbc4tools 华大单细胞上游批量分析
#
# 用法:
#   启动:  docker compose up -d
#   查看:  docker compose logs -f
#   停止:  docker compose down
#
# 注意: 请先修改 volumes 中的路径为实际路径
# =============================================================================

version: "3.8"

services:
  dnbc4tools:
    image: dnbc4tools:v3.1
    container_name: dnbc4tools-batch
    volumes:
      # ⚠️ 修改以下路径为你的实际路径
      - /path/to/your/fastq:/data/fastq:ro       # FASTQ 数据 (只读)
      - /path/to/your/ref:/data/ref:ro           # 参考基因组 (只读)
      - /path/to/your/output:/data/output        # 输出目录
    environment:
      - TZ=Asia/Shanghai
    # 默认 dry-run 模式, 确认无误后修改为实际运行参数
    command: >
      bash /opt/dnbc4tools-skill/华大批量上游分析dnbc4tools.sh
        -f /data/fastq
        -o /data/output
        -r /data/ref
        -n
    restart: "no"
